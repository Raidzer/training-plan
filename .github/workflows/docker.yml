name: Build and publish Docker image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve app version
        id: app-version
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"

            if [[ "${package_version}" != "${tag_version}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}"
              exit 1
            fi

            version="${tag_version}"
          else
            version="${package_version}-${GITHUB_SHA::7}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.app-version.outputs.version }}
            NEXT_PUBLIC_GIT_SHA=${{ steps.app-version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
